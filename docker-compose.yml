services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cliper-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && node index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cliper-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"